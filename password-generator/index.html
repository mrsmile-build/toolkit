  <style>
    .toggle-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .toggle-item{display:flex;align-items:center;gap:10px;padding:14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--bg);transition:all .2s}
    .toggle-item.active{border-color:var(--accent);background:#fff8f5}

<body>

<div class="page-wrapper">
  <a class="back-link" href="../index.html">← All Tools</a>
  <h1 class="page-title">Password Generator</h1>
  <p class="page-subtitle">Generate strong random passwords. Nothing is saved or sent anywhere.</p>
  <div class="tool-card">
    <div class="length-row">
      <label>Length:</label>
      <input type="range" id="pwdLength" min="6" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value">
      <span class="length-val" id="lenVal">16</span>
    </div>
    <div class="toggle-group">
      <div class="toggle-item active" onclick="toggle('Upper',this)"><input type="checkbox" id="useUpper" checked><label>Uppercase (A-Z)</label></div>
      <div class="toggle-item active" onclick="toggle('Lower',this)"><input type="checkbox" id="useLower" checked><label>Lowercase (a-z)</label></div>
      <div class="toggle-item active" onclick="toggle('Numbers',this)"><input type="checkbox" id="useNumbers" checked><label>Numbers (0-9)</label></div>
      <div class="toggle-item active" onclick="toggle('Symbols',this)"><input type="checkbox" id="useSymbols" checked><label>Symbols (!@#$)</label></div>
    </div>
    <button class="btn" onclick="generate()">Generate Password</button>
    <div class="pwd-output" id="pwdOut">
      <div class="pwd-display" id="pwdDisplay">-</div>
      <div class="pwd-actions">
        <button class="btn btn-outline" style="padding:10px 18px;font-size:.85rem" onclick="copyPwd()">Copy</button>
        <button class="btn btn-outline" style="padding:10px 18px;font-size:.85rem" onclick="generate()">New Password</button>
      </div>
      <div class="strength-track"><div class="strength-fill" id="sFill" style="width:0%"></div></div>
      <span class="strength-label" id="sLabel"></span>
    </div>
  </div>
</div>
<footer><p>2025 ToolKit · <a href="../privacy.html">Privacy Policy</a> · <a href="../index.html">All Tools</a></p></footer>
<script>
  function toggle(t,el){const cb=document.getElementById("use"+t);cb.checked=!cb.checked;el.classList.toggle("active",cb.checked);}
  function generate(){
    let chars="";
    if(document.getElementById("useUpper").checked)chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if(document.getElementById("useLower").checked)chars+="abcdefghijklmnopqrstuvwxyz";
    if(document.getElementById("useNumbers").checked)chars+="0123456789";
    if(document.getElementById("useSymbols").checked)chars+="!@#$%^&*()_+-=[]{}|;:,.?";
    if(!chars){alert("Select at least one option.");return;}
    const len=parseInt(document.getElementById("pwdLength").value);
    const arr=new Uint32Array(len);crypto.getRandomValues(arr);
    let pwd="";for(let i=0;i<len;i++)pwd+=chars[arr[i]%chars.length];
    document.getElementById("pwdDisplay").textContent=pwd;
    document.getElementById("pwdOut").classList.add("show");
    let score=0;
    if(pwd.length>=8)score++;if(pwd.length>=12)score++;if(pwd.length>=16)score++;
    if(/[A-Z]/.test(pwd))score++;if(/[a-z]/.test(pwd))score++;if(/[0-9]/.test(pwd))score++;if(/[^A-Za-z0-9]/.test(pwd))score++;
    const levels=[{l:"Weak",p:25,c:"#ef4444"},{l:"Fair",p:50,c:"#f59e0b"},{l:"Strong",p:75,c:"#3b82f6"},{l:"Very Strong",p:100,c:"#22c55e"}];
    const s=score<=2?levels[0]:score<=4?levels[1]:score<=5?levels[2]:levels[3];
    document.getElementById("sFill").style.width=s.p+"%";document.getElementById("sFill").style.background=s.c;
    document.getElementById("sLabel").textContent=s.l;document.getElementById("sLabel").style.color=s.c;
  }
  function copyPwd(){navigator.clipboard.writeText(document.getElementById("pwdDisplay").textContent).then(()=>{const b=document.querySelector(".pwd-actions .btn-outline");b.textContent="Copied!";setTimeout(()=>b.textContent="Copy",2000);});}
</script>
